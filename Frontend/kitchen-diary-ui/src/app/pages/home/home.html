<main>
    <section class="hero">
    <h1>Welcome to KitchenDiary</h1>

    <p>Every Recipe Tells A Story. Organize your favorite recipes in one beautiful place.</p>

   
    </section>


    <section class="search-section">
         <input type="text" placeholder="Search your recipes here..."/>

        <button>Add Recipe</button>

    </section>

    <section class="recipes">

        <h2>Your Recipes</h2>
        <div class="recipe-grid">

            @for(recipe of recipes; track recipe.id)
            {
                <app-recipe-card
                [recipe]="recipe">
                </app-recipe-card>
            }

        </div>
        

    </section>
    

</main>
