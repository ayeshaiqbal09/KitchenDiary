<article class="recipe-card">
    <div class="recipe-image">
        <div class="image-overlay">

            <button class="view-btn">
            View Recipe →
            </button>

        </div>
    </div>
    <div class="recipe-content">
        <h3>{{recipe.title}}</h3>

        <div class="rating">
           {{recipe.rating}}
        </div>

        <span class="category">
            {{recipe.recipeType}}
        </span>
    </div>
</article>
